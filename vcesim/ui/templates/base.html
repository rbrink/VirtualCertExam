<!DOCTYPE html>
<html lang="en">
    {% include 'components/head.html' %}
    <body style="padding: 70px 15px 50px">
        {% include 'components/nav.html' %}
        {% include 'components/flash.html' %}
        <div class="container mt-4">            
            {% block content %}{% endblock %}
        </div>
        <div class="container-fluid h-100" id="footer">
            <div class="row" style="height: 30px;">
                <div class="row h-100" style="height: 40px;">
                    <div class="col-sm-12 h-100">
                        {% block footer %}
                            <p class="text-center h-100" style="margin-bottom: auto; margin-top: auto">
                                Virtual CertExam Simulator, Copyright 2026
                            </p>
                        {% endblock %}
                    </div>
                </div>
            </div>
        </div>
        {% block js %}
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
        {% endblock %}
    </body>
</html>
